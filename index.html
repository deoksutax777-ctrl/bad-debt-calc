/* ═══ 서식 ═══ */

      <div style={{fontSize:"min(3vw,12px)",fontWeight:700,marginBottom:5}}>1. 대손충당금조정</div>
      <div style={{overflowX:"auto",marginBottom:3}}>
      <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed",minWidth:500}}><colgroup><col style={{width:"7%"}}/><col style={{width:"12%"}}/><col style={{width:"6%"}}/><col style={{width:"8%"}}/><col style={{width:"8%"}}/><col style={{width:"10%"}}/><col style={{width:"10%"}}/><col style={{width:"8%"}}/><col style={{width:"11%"}}/><col style={{width:"12%"}}/></colgroup><tbody>
        <tr><td style={h} rowSpan={3}>손 금<br/>산입액<br/>조 정</td><td style={h} rowSpan={2}>①채권잔액<br/>(㉑의 금액)</td><td style={h} colSpan={3}>② 설정률</td><td style={h} rowSpan={2}>③한도액<br/>(①×②)</td><td style={h} colSpan={2}>회사계상액</td><td style={h} rowSpan={2}>⑥ 계</td><td style={h} rowSpan={2}>⑦한도초과액<br/>(⑥-③)</td></tr>

/* ═══ Main ═══ */
function App() {
  const [tab, setTab] = useState("input");
  const [theme, setTheme] = useState("green");
  const t = THEMES[theme];
  const topRef = useRef(null);
  useEffect(()=>{if(topRef.current) topRef.current.scrollIntoView({behavior:"smooth"});},[tab]);

  const [companyName, setCompanyName] = useState("");
  const [bizYear, setBizYear] = useState("2025");
  const [bizNo, setBizNo] = useState("");
  const [receivables, setReceivables] = useState([{id:1,name:"외상매출채권",amount:0,excluded:0}]);
  const [nextId, setNextId] = useState(2);
  const [provBeg, setProvBeg] = useState(0);
  const [provIncrease, setProvIncrease] = useState(0);
  const [provDecrease, setProvDecrease] = useState(0);
  const [midReversal, setMidReversal] = useState(0);
  const [provEnd, setProvEnd] = useState(0);
  const [denied, setDenied] = useState(0);
  const [endReversal, setEndReversal] = useState(0);
  const [priorBD, setPriorBD] = useState(0);
  const [rateMode, setRateMode] = useState("auto");

  const totalRec = useMemo(()=>receivables.reduce((s,r)=>s+(r.amount||0),0),[receivables]);
  const totalExcl = useMemo(()=>receivables.reduce((s,r)=>s+(r.excluded||0),0),[receivables]);
  const taxBase = totalRec - totalExcl;
  const calcEnd = provBeg + provIncrease - provDecrease - midReversal - endReversal;
  const endMismatch = (provEnd>0||provBeg>0)&&calcEnd!==provEnd;
  const actualRate = taxBase>0?((provDecrease+priorBD)/(taxBase*2))*100:0;
  const statutoryRate = 1;
  const appliedRate = rateMode==="statutory"?statutoryRate:rateMode==="actual"?actualRate:Math.max(actualRate,statutoryRate);
  const limit = Math.floor(taxBase*appliedRate/100);
  const v5 = Math.max(provEnd-provIncrease,0);
  const overLimit = Math.max(provEnd-limit,0);
  const v13 = provBeg-midReversal-denied-provDecrease-v5;
  const v15 = v13-endReversal;

  const warnings = useMemo(()=>{
    const w=[];
    if(!companyName) w.push("법인명 미입력");
    if(totalRec===0) w.push("채권잔액 0원");
    if(totalExcl>totalRec) w.push("설정제외 > 총채권");
    if(overLimit>0) w.push("⑦ 한도초과 "+fmt(overLimit)+" 손금불산입(유보)");
    if(provEnd<0) w.push("충당금 기말 음수");
    if(v15>0) w.push("⑮ 과소환입 "+fmt(v15)+" 익금산입(유보)");
    if(v15<0) w.push("⑮ 과다환입 △"+fmt(Math.abs(v15))+" 손금산입(△유보)");
    if(endMismatch) w.push("기말검증: "+fmt(calcEnd)+" ≠ 입력 "+fmt(provEnd));
    if(v15<0&&Math.abs(v15)!==denied&&denied>0) w.push("※ ⑮("+fmt(Math.abs(v15))+") ≠ ⑩("+fmt(denied)+")");
    return w;
  },[companyName,totalRec,totalExcl,overLimit,provEnd,v15,endMismatch,calcEnd,denied]);

  const updRec=(id,f,val)=>setReceivables(receivables.map(r=>r.id===id?{...r,[f]:val}:r));
  const addRec=()=>{setReceivables([...receivables,{id:nextId,name:"미수금",amount:0,excluded:0}]);setNextId(nextId+1);};
  const delRec=(id)=>setReceivables(receivables.filter(r=>r.id!==id));
  const goNext=()=>{const k=TABS.map(x=>x.key);const i=k.indexOf(tab);if(i<k.length-1)setTab(k[i+1]);};
  const goPrev=()=>{const k=TABS.map(x=>x.key);const i=k.indexOf(tab);if(i>0)setTab(k[i-1]);};

  const card={background:t.cardBg,borderRadius:14,border:"1.5px solid "+t.cardBdr,marginBottom:16,overflow:"hidden"};
  const cardH={padding:"13px 16px",borderBottom:"1.5px solid "+t.cardBdr,fontWeight:700,fontSize:15,background:t.cardHBg,display:"flex",justifyContent:"space-between",alignItems:"center"};
  const cardB={padding:"16px"};
  const rw={display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+t.rowBdr};

  return (
    <div className="app-shell" style={{background:t.bg,minHeight:"100vh",fontSize:14,lineHeight:1.6,color:t.text}}>
      <div ref={topRef}></div>
      {/* Header */}
      <div className="app-header" style={{background:t.primaryGrad,color:"#fff",padding:"18px 18px 14px",paddingTop:"max(18px, env(safe-area-inset-top))",position:"relative",overflow:"hidden"}}>
        {t.showKitty&&<div className="kitty-deco" style={{position:"absolute",top:6,right:10,opacity:.2}}><KittyFace size={55} color="#fff"/></div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h1 style={{fontSize:18,fontWeight:700,margin:0}}>{t.showKitty?"🎀 ":""}대손충당금 명세서</h1>
            <div style={{fontSize:11,opacity:.85,marginTop:2}}>별지 제58호서식 · 자동계산</div>
          </div>
          <div className="theme-sw" style={{display:"flex",gap:4}}>
            {Object.entries(THEMES).map(([k,th])=>(<button key={k} onClick={()=>setTheme(k)} style={{width:28,height:28,borderRadius:14,border:theme===k?"2px solid #fff":"2px solid rgba(255,255,255,.3)",background:theme===k?"rgba(255,255,255,.3)":"transparent",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}} title={th.name}>{th.name.slice(0,2)}</button>))}
          </div>
        </div>
      </div>

      {/* Top tabs */}
      <div className="top-tabs" style={{display:"flex",gap:2,padding:"0 16px",background:t.tabBg}}>
        {TABS.map(x=>(<button key={x.key} onClick={()=>setTab(x.key)} style={{padding:"9px 20px",fontSize:14,fontWeight:tab===x.key?600:400,color:tab===x.key?t.tabActiveTxt:t.tabInactiveTxt,background:tab===x.key?t.bg:"transparent",border:"none",borderRadius:"8px 8px 0 0",cursor:"pointer"}}>{x.icon} {x.label}{x.key==="form"&&warnings.length>0&&<span style={{marginLeft:5,background:"#fff",color:t.primary,borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:700}}>{warnings.length}</span>}</button>))}
      </div>

      <div className="main-content" style={{padding:16,maxWidth:680,margin:"0 auto"}}>

        {/* ═══ INPUT ═══ */}
        {tab==="input"&&(<Fragment>
          <div style={card}><div style={cardH}><span><Ico t={t} size={22}/> 기본정보</span></div><div style={cardB}>
            <div className="field"><label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>법인명</label><input type="text" value={companyName} onChange={e=>setCompanyName(e.target.value)} placeholder="(주)예시법인" style={{width:"100%",padding:"10px 12px",border:"1px solid "+t.inputBdr,borderRadius:10,fontSize:16,background:"#fff",outline:"none",boxSizing:"border-box",textAlign:"left"}} /></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div className="field"><label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>사업연도</label><input type="text" value={bizYear} onChange={e=>setBizYear(e.target.value)} style={{width:"100%",padding:"10px 12px",border:"1px solid "+t.inputBdr,borderRadius:10,fontSize:16,background:"#fff",outline:"none",boxSizing:"border-box",textAlign:"center"}} /></div><div className="field"><label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>사업자등록번호</label><input type="text" value={bizNo} onChange={e=>setBizNo(e.target.value)} placeholder="000-00-00000" style={{width:"100%",padding:"10px 12px",border:"1px solid "+t.inputBdr,borderRadius:10,fontSize:16,background:"#fff",outline:"none",boxSizing:"border-box",textAlign:"center"}} /></div></div>
          </div></div>

          <div style={card}><div style={cardH}><span><Paw t={t}/> ① 채권 기말잔액</span><button onClick={addRec} style={{padding:"6px 12px",fontSize:13,background:t.primaryGrad,color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}}>+ 추가</button></div><div style={cardB}>
            {receivables.map((r,i)=>(<div key={r.id} style={{padding:"12px 0",borderBottom:i<receivables.length-1?"1px solid "+t.rowBdr:"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <select style={{flex:1,textAlign:"left",padding:"10px 12px",border:"1px solid "+t.inputBdr,borderRadius:10,fontSize:16,background:"#fff"}} value={r.name} onChange={e=>updRec(r.id,"name",e.target.value)}>{ACCTS.map(a=><option key={a}>{a}</option>)}</select>
                {receivables.length>1&&<button onClick={()=>delRec(r.id)} style={{padding:"8px 12px",fontSize:13,background:t.accentLight,color:t.resultBad,border:"none",borderRadius:8,cursor:"pointer"}}>삭제</button>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <NumberInput t={t} label="장부가액" value={r.amount} onChange={v=>updRec(r.id,"amount",v)} />
                <NumberInput t={t} label="설정제외 채권" value={r.excluded} onChange={v=>updRec(r.id,"excluded",v)} />
              </div>
            </div>))}
            <div style={{marginTop:12,padding:"12px 14px",background:t.summaryBg,borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid "+t.summaryBdr}}><span style={{fontSize:14,fontWeight:600,color:t.accent}}><Ico t={t} size={16}/> 설정대상 채권잔액</span><span style={{fontSize:18,fontWeight:700,color:t.accent,fontVariantNumeric:"tabular-nums"}}>{fmt(taxBase)}</span></div>
          </div></div>

          <div style={card}><div style={cardH}><span><Ico t={t} size={22}/> ② 대손충당금</span></div><div style={cardB}>
            <NumberInput t={t} label="⑧ 기초잔액" value={provBeg} onChange={setProvBeg} />
            <NumberInput t={t} label="④ 전입 (대손상각비)" value={provIncrease} onChange={setProvIncrease} hint="※ 차변 대손상각비 / 대변 대손충당금으로 증가시킨 금액" />
            <NumberInput t={t} label="⑪ 상계 (실제대손 제각)" value={provDecrease} onChange={setProvDecrease} hint="※ 차변 대손충당금 / 대변 채권으로 상계한 금액" />
            <NumberInput t={t} label="⑨ 기중 환입 (채권회수 등)" value={midReversal} onChange={setMidReversal} hint="※ 기중에 대손처리 채권이 회수되어 충당금 환입된 금액 (없으면 0)" />
            <NumberInput t={t} label="⑭ 기말 회사환입액" value={endReversal} onChange={setEndReversal} hint="※ 대손충당금을 기말에 환입하는 경우 환입액 입력 (없으면 0)" />
            <div style={{borderTop:"2px solid "+t.cardBdr,paddingTop:14,marginTop:4}}>
              <NumberInput t={t} label="⑥ 기말잔액 (BS상 대손충당금 차기이월)" value={provEnd} onChange={setProvEnd} />
            </div>
            {endMismatch&&<div style={{padding:"8px 12px",background:t.warnBg,border:"1px solid "+t.warnBdr,borderRadius:8,fontSize:12,color:t.warnTxt,marginTop:4}}>※ 검증: {fmt(provBeg)}+{fmt(provIncrease)}-{fmt(provDecrease)}-{fmt(midReversal)}-{fmt(endReversal)} = {fmt(calcEnd)} (입력: {fmt(provEnd)})</div>}
            <ReadonlyField t={t} label="⑤ 보충액 (자동: ⑥-④)" value={v5} sub={fmt(provEnd)+" - "+fmt(provIncrease)+" = "+fmt(v5)} />
          </div></div>

          <div style={card}><div style={cardH}><span><Paw t={t}/> 세무조정 이월</span></div><div style={cardB}>
            <NumberInput t={t} label="⑩ 전기 충당금 부인누계 (유보)" value={denied} onChange={setDenied} hint="※ 전기 자본금과적립금(을)의 대손충당금 기말잔액" />
            <NumberInput t={t} label="전기 대손 처리액 (실적률용)" value={priorBD} onChange={setPriorBD} />
            <div className="field">
              <label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>② 설정률 적용 방식</label>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[{v:"auto",l:"자동 (큰 금액)"},{v:"statutory",l:"법정률 1% 고정"},{v:"actual",l:"실적률 고정"}].map(o=>(<button key={o.v} onClick={()=>setRateMode(o.v)} style={{flex:"1 1 auto",padding:"9px 12px",fontSize:13,fontWeight:rateMode===o.v?600:400,background:rateMode===o.v?t.primary:"#fff",color:rateMode===o.v?"#fff":t.textLight,border:"1.5px solid "+(rateMode===o.v?t.primary:t.cardBdr),borderRadius:8,cursor:"pointer"}}>{o.l}</button>))}
              </div>
              <div style={{fontSize:11.5,color:t.hint,marginTop:3,paddingLeft:2}}>※ 전기 데이터 부족 시 법정률 1% 고정을 선택하세요</div>
            </div>
          </div></div>

          <div className="nav-area" style={{marginTop:8,marginBottom:20}}>
            <button className="nav-btn" style={{background:t.primaryGrad,color:"#fff"}} onClick={goNext}>{t.showKitty?"🎀 ":""}계산 결과 보기 →</button>
          </div>
          {t.showKitty&&<div className="kitty-deco" style={{textAlign:"center",opacity:.12,marginBottom:20}}><KittyFace size={60} color={t.primary}/></div>}
        </Fragment>)}

        {/* ═══ CALC ═══ */}
        {tab==="calc"&&(<Fragment>
          <div style={card}><div style={cardH}><span><Paw t={t}/> 세법 한도액</span></div><div style={cardB}>
            <div style={rw}><span>설정대상 채권잔액 (㉑)</span><span style={{fontWeight:700}}>{fmt(taxBase)}</span></div>
            <div style={rw}><span>대손실적률 (ㄴ)</span><span style={{fontWeight:700,color:actualRate>statutoryRate?t.accent:t.textLight}}>{actualRate.toFixed(4)}%{actualRate>statutoryRate&&" ▲"}</span></div>
            <div style={rw}><span>법정설정률 (ㄱ)</span><span style={{fontWeight:700,color:statutoryRate>=actualRate?t.accent:t.textLight}}>{statutoryRate}%{statutoryRate>=actualRate&&" ▲"}</span></div>
            <div style={{...rw,borderBottom:"2px solid "+t.cardBdr,paddingBottom:14}}><span style={{fontWeight:700,fontSize:15}}>③ 한도액 {rateMode!=="auto"&&<span style={{fontSize:11,fontWeight:400,color:t.primary}}>({rateMode==="statutory"?"법정률 고정":"실적률 고정"})</span>}</span><span style={{fontWeight:700,fontSize:20,color:t.accent}}>{fmt(limit)}</span></div>
            <div style={{fontSize:12,color:t.textLight,padding:"6px 10px",background:t.cardHBg,borderRadius:8,marginTop:8}}>{fmt(taxBase)} × {appliedRate.toFixed(4)}% = {fmt(limit)}</div>
          </div></div>

          <div style={card}><div style={cardH}><span><Ico t={t} size={20}/> ⑦ 손금산입 조정</span></div><div style={cardB}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 40px 1fr",alignItems:"center",marginBottom:16}}>
              <div style={{padding:"14px",background:t.cardHBg,borderRadius:10,textAlign:"center",border:"1px solid "+t.cardBdr}}><div style={{fontSize:12,color:t.textLight,marginBottom:4}}>⑥ 기말충당금</div><div style={{fontSize:20,fontWeight:700}}>{fmt(provEnd)}</div></div>
              <div style={{textAlign:"center",fontSize:18,fontWeight:700,color:t.primary}}>vs</div>
              <div style={{padding:"14px",background:t.summaryBg,borderRadius:10,textAlign:"center",border:"1px solid "+t.summaryBdr}}><div style={{fontSize:12,color:t.accent,marginBottom:4}}>③ 한도액</div><div style={{fontSize:20,fontWeight:700,color:t.accent}}>{fmt(limit)}</div></div>
            </div>
            <div style={{padding:"12px 14px",borderRadius:10,background:overLimit>0?t.accentLight:t.okBg,border:"1px solid "+(overLimit>0?t.cardBdr:t.okBdr)}}>
              <div style={{fontSize:13,color:t.textLight,marginBottom:4}}>⑦ 한도초과 손금불산입</div>
              <div style={{fontSize:22,fontWeight:700,color:overLimit>0?t.resultBad:t.resultGood}}>{fmt(overLimit)}</div>
              {overLimit>0&&<div style={{fontSize:12,fontWeight:600,color:t.resultBad,marginTop:4}}>→ 유보</div>}
              {overLimit===0&&<div style={{fontSize:12,color:t.resultGood,marginTop:4}}>한도 이내 ✓</div>}
            </div>
          </div></div>

          <div style={card}><div style={cardH}><span><Paw t={t}/> ⑮ 익금산입 조정</span></div><div style={cardB}>
            <div style={{fontSize:12,color:t.textLight,padding:"10px 12px",background:t.cardHBg,borderRadius:8,marginBottom:12,lineHeight:1.8,border:"1px solid "+t.cardBdr}}>
              <strong>⑬</strong> = ⑧ - ⑨ - ⑩ - ⑪ - ⑫(=⑤)<br/>
              = {fmt(provBeg)} - {fmt(midReversal)} - {fmt(denied)} - {fmt(provDecrease)} - {fmt(v5)}<br/>
              = <strong style={{color:t.text}}>{fmtD(v13)}</strong>
            </div>
            <div style={{fontSize:12,color:t.textLight,padding:"10px 12px",background:t.cardHBg,borderRadius:8,marginBottom:12,border:"1px solid "+t.cardBdr}}>
              <strong>⑮</strong> = ⑬ - ⑭ = {fmtD(v13)} - {fmt(endReversal)} = <strong style={{color:t.text}}>{fmtD(v15)}</strong>
            </div>
            <div style={{padding:"12px 14px",borderRadius:10,background:v15<0?"#e3f2fd":v15>0?t.warnBg:t.okBg,border:"1px solid "+(v15<0?"#90caf9":v15>0?t.warnBdr:t.okBdr)}}>
              <div style={{fontSize:13,color:t.textLight,marginBottom:4}}>⑮ 과소환입 · 과다환입(△)</div>
              <div style={{fontSize:22,fontWeight:700,color:v15>0?t.resultWarn:v15<0?t.resultBlue:t.resultGood}}>{fmtD(v15)}</div>
              {v15>0&&<div style={{fontSize:12,fontWeight:600,color:t.resultWarn,marginTop:4}}>→ 과소환입 · 익금산입 · 유보</div>}
              {v15<0&&<div style={{fontSize:12,fontWeight:600,color:t.resultBlue,marginTop:4}}>→ 과다환입 · 손금산입 · △유보</div>}
              {v15===0&&<div style={{fontSize:12,color:t.resultGood,marginTop:4}}>조정 없음 ✓</div>}
            </div>
            {v15<0&&denied>0&&Math.abs(v15)===denied&&(<div style={{marginTop:10,padding:"8px 12px",background:t.okBg,border:"1px solid "+t.okBdr,borderRadius:8,fontSize:12,color:t.okTxt}}>{t.showKitty&&<KittyMini size={14} color={t.primary}/>} ✓ 과다환입 △{fmt(denied)} = 전기유보 — 유보 해소!</div>)}
          </div></div>

          {t.showKitty&&<div className="kitty-deco" style={{textAlign:"center",opacity:.1,margin:"8px 0"}}><KittyPaw size={14} color={t.primary}/><KittyPaw size={14} color={t.primary}/><KittyPaw size={14} color={t.primary}/></div>}
          <div className="nav-area" style={{display:"flex",gap:10,marginTop:8,marginBottom:20}}>
            <button className="nav-btn" style={{flex:1,background:t.navSecBg,color:t.navSecTxt}} onClick={goPrev}>← 입력</button>
            <button className="nav-btn" style={{flex:1,background:t.primaryGrad,color:"#fff"}} onClick={goNext}>{t.showKitty?"🎀 ":""}서식 보기 →</button>
          </div>
        </Fragment>)}

        {/* ═══ FORM ═══ */}
        {tab==="form"&&(<Fragment>
          {warnings.length>0 ? (
            <div style={{background:t.warnBg,border:"1px solid "+t.warnBdr,borderRadius:10,padding:"10px 14px",marginBottom:14}}>
              <div style={{fontWeight:600,color:t.warnTxt,fontSize:13,marginBottom:4}}>⚠ 검토 ({warnings.length}건)</div>
              {warnings.map((w,i)=><div key={i} style={{fontSize:13,padding:"2px 0"}}>· {w}</div>)}
            </div>
          ) : (
            <div style={{background:t.okBg,border:"1px solid "+t.okBdr,borderRadius:10,padding:"10px 14px",marginBottom:14}}>
              <div style={{fontWeight:600,color:t.okTxt,fontSize:13}}>{t.showKitty&&<KittyMini size={16} color={t.primary}/>} ✓ 검토 통과!</div>
            </div>
          )}
          <div style={{overflowX:"auto"}}>
            <Form58 t={t} companyName={companyName} bizYear={bizYear} bizNo={bizNo} receivables={receivables} taxBase={taxBase}
              sPct={statutoryRate+"%"} aPct={actualRate.toFixed(4)+"%"} rPct={appliedRate.toFixed(4)+"%"}
              limit={limit} v4={provIncrease} v5={v5} provEnd={provEnd} overLimit={overLimit}
              provBeg={provBeg} provDec={provDecrease} midRev={midReversal} denied={denied}
              endRev={endReversal} v13={v13} v15={v15} />
          </div>
          <div className="nav-area" style={{display:"flex",gap:10,marginTop:16,marginBottom:20}}>
            <button className="nav-btn" style={{background:t.navSecBg,color:t.navSecTxt}} onClick={goPrev}>← 계산 결과</button>
          </div>
          {t.showKitty&&<div className="kitty-deco" style={{textAlign:"center",opacity:.12,marginBottom:20}}><KittyFace size={50} color={t.primary}/></div>}
        </Fragment>)}
      </div>

      {/* Bottom tabs */}
      <div className="bottom-tabs" style={{background:t.bottomTabBg,borderTop:"1.5px solid "+t.bottomTabBdr}}>
        {TABS.map(x=>(<button key={x.key} className={tab===x.key?"active":""} onClick={()=>setTab(x.key)} style={{color:tab===x.key?t.bottomTabActive:t.bottomTabInactive,fontWeight:tab===x.key?700:400}}><span className="tab-icon">{x.icon}</span>{x.label}{x.key==="form"&&warnings.length>0&&<span className="badge" style={{background:t.badgeBg}}>{warnings.length}</span>}</button>))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
